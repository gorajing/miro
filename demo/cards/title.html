<!doctype html><html><meta charset="utf8"><!--
  Miro title card — 1280x720. Record: node record-animation.js "file:///abs/title.html" 5000 ./rec
--><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1280px;height:720px;overflow:hidden}
  body{background:radial-gradient(120% 90% at 50% 30%,#221911 0%,#14110d 70%);color:#f6e8cf;
    font-family:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{width:1280px;height:720px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .brand{font-size:20px;font-weight:700;letter-spacing:.18em;color:#72d8ff;text-transform:uppercase}
  .miro{width:220px;height:auto;image-rendering:pixelated;margin:10px 0 0;filter:drop-shadow(0 10px 0 rgba(0,0,0,.28))}
  .name{font-size:128px;font-weight:800;letter-spacing:-3px;color:#f6e8cf}
  .tag{font-size:34px;font-weight:600;color:#e8b978;margin-top:10px}
  .sub{font-size:22px;color:#b9a888;font-weight:500;margin-top:18px}
  .reveal{opacity:0;transform:translateY(16px);animation:up .6s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes up{to{opacity:1;transform:none}}
</style><body>
  <div class="wrap">
    <div class="brand reveal" style="animation-delay:.1s">Cerebras × Gemma 4 Hackathon</div>
    <img class="miro reveal" style="animation-delay:.35s" src="../assets/miro-sprite.png" alt="">
    <div class="name reveal" style="animation-delay:.55s">Miro</div>
    <div class="tag reveal" style="animation-delay:.9s">a desktop pet who understands your screen</div>
    <div class="sub reveal" style="animation-delay:1.3s">Gemma 4 31B · Cerebras</div>
  </div>
</body></html>
